<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Student Survey Form</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
.logo {
      width: 120px;
      margin-bottom: 10px;
    }

    h1, p {
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-weight: bold;
      margin-top: 10px;
    }

    input, select, textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 100%;
    }

    .inline-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .submit-btn {
      margin-top: 15px;
      padding: 12px;
      background: #800080;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #5a005a;
    }
  </style>
</head>

<body>

  <div class="container">
 <img class="logo"
          src="https://res.cloudinary.com/dci3t8fjv/image/upload/v1749529304/UiTM-logo-1-1024x432_sunxs6.png"
          alt="logoUitm">
    <h1 id="title">UiTM Student Survey Form</h1>

    <p id="description">
      Help us improve student facilities and learning experience at UiTM.
    </p>

    <form id="survey-form">

      
      <label id="name-label" for="name">Full Name</label>
      <input id="name" type="text" placeholder="Enter your full name" required>

      
      <label id="email-label" for="email">Email</label>
      <input id="email" type="email" placeholder="Enter your email" required>

      <label id="number-label" for="number">Age</label>
      <input id="number" type="number" min="18" max="60" placeholder="Enter your age">

      
      <label for="dropdown">Campus</label>
      <select id="dropdown">
        <option value="kuala-terengganu">Kuala Terengganu</option>
        <option value="Dungun">Dungun</option>
        <option value="Bukit-besi">Bukit Besi</option>
      </select>

      
      <label>Study Mode</label>
      <div class="inline-group">
        <label><input type="radio" name="mode" value="full-time"> Full Time</label>
        <label><input type="radio" name="mode" value="part-time"> Part Time</label>
      </div>

      
      <label>Facilities You Use</label>
      <div class="inline-group">
        <label><input type="checkbox" value="library"> Library</label>
        <label><input type="checkbox" value="lab"> Computer Lab</label>
        <label><input type="checkbox" value="cafeteria"> Cafeteria</label>
      </div>

      
      <label for="comments">Additional Comments</label>
      <textarea id="comments" rows="4" placeholder="Write your feedback here..."></textarea>

      
      <button id="submit" type="submit" class="submit-btn">
        Submit Survey
      </button>

    </form>

  </div>

</body>
</html>
